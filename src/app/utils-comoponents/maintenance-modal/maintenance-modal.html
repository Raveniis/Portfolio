<mat-dialog-content>
  <div class="flex flex-col items-center gap-8 py-4 px-8">
    <div class="flex items-center gap-2">
      <mat-icon>build</mat-icon>
      <h3 class="text-3xl font-medium text-center">{{ this.data.title }}</h3>
    </div>
    <p class="text-center">
      {{ this.data.message }}
    </p>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button matButton mat-dialog-close>Dismiss</button>
</mat-dialog-actions>

<div class="flex justify-between items-center px-4 h-[60px] bg-white dark:bg-blue-950 border-b">
  <h1 class="text-2xl text-black-200 dark:text-gray-200">{{ data.title }}</h1>

  <div>
    <tooltip matTooltip="Download Document" matTooltipPosition="below">
      <button mat-icon-button (click)="downloadDocument()"><mat-icon class="text-black-200! dark:text-gray-200!">download</mat-icon></button>
    </tooltip>
    <button mat-icon-button (click)="closeModal()"><mat-icon class="text-black-200! dark:text-gray-200!">close</mat-icon></button>
  </div>
</div>

<mat-dialog-content class="bg-white dark:bg-blue-800">
  <iframe [src]="data.url | safeUrl" class="w-full h-full"></iframe>
</mat-dialog-content>

<mat-drawer-container class="" [hasBackdrop]="true">
  <mat-drawer #drawer [mode]="'over'" position="end" class="dark:bg-blue-950!">
    <app-sidebar (onToggleSidenav)="drawer.toggle()" />
  </mat-drawer>
  <mat-drawer-content #drawerContent (scroll)="onScroll($event)">
    <app-header (onToggleSidenav)="drawer.toggle()" [hideNavBar]="hideNav" />
    <router-outlet />
    <app-footer />
    <app-scroll-to-top-fab [hideFAB]="hideScrollToTopFAB" (onScrollToTop)="scrollToTop()" />
  </mat-drawer-content>
</mat-drawer-container>

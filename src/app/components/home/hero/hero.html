<section id="about" class="flex flex-col sm:flex-row items-center gap-16 sm:gap-4" trackSection>
  <div class="flex flex-2 flex-col w-full sm:w-fit items-center gap-2">
    <div class="flex justify-center h-full sm:h-64 sm:w-64 bg-gradient-to-t from-gray-300 to-gray-100 dark:from-blue-800 dark:to-blue-200 rounded-lg p-2 z-2">
      <img class="object-contain" src="./pictures/Legarde.jpg" />
    </div>
    <div class="flex flex-col items-center">
      <h3 class="text-2xl font-medium">{{ heroData.name }}</h3>
      <h4 class="text-lg font-light">{{ heroData.title }}</h4>
    </div>
  </div>
  <div class="flex-3">
    <div class="flex flex-col gap-8">
      <h2 class="text-5xl uppercase font-medium tracking-wider">About</h2>
      <p class="text-md text-black-200 dark:text-gray-200">
        {{ heroData.description }}
      </p>
      <button matButton="filled" style="width: fit-content" (click)="viewDocument()">View Resume</button>
      <app-socials size="large" />
    </div>
  </div>
</section>

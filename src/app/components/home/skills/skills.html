<section id="skills" class="flex flex-col gap-8" trackSection>
  <h2 class="text-center font-medium text-5xl uppercase tracking-wider">Skills</h2>
  <div class="grid grid-cols-2 sm:flex flex-wrap gap-4 justify-center">
    @for (skill of skills; track skill.name) {
      <mat-card
        class="border-1 border-blue-500 dark:border-blue-950 bg-white dark:bg-blue-500! flex flex-col items-center gap-2 w-full sm:w-36 h-fit p-4 rounded-md border-1 border-blue-500 dark:border-blue-950 bg-white dark:bg-blue-500 hover:scale-105 hover:-translate-y-1 transition-all duration-300"
      >
        <img class="max-w-32 sm:max-w-7xl w-full h-full p-2" [src]="skill.src" [alt]="skill.name" />
        <p class="text-center text-lg font-medium">{{ skill.name }}</p>
      </mat-card>
    }
  </div>
</section>

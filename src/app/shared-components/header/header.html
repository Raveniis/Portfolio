<header
  [ngClass]="{ '-translate-y-15 sm:translate-y-0': hideNavBar }"
  class="sticky top-0 shadow-md flex justify-between items-center py-4 px-6 h-[60px] z-10 bg-white dark:bg-blue-950 transition-all!"
>
  <div>
    @if (darkMode) {
      <button matIconButton (click)="toggleDarkMode()">
        <mat-icon class="text-gray-200!">light_mode</mat-icon>
      </button>
    } @else {
      <button matIconButton (click)="toggleDarkMode()">
        <mat-icon class="text-black-200!">dark_mode</mat-icon>
      </button>
    }
  </div>
  <nav class="relative hidden sm:flex gap-5" #navigation>
    @for (link of navigationLinks; track $index) {
      <a
        #links
        [href]="link.link + link.fragment"
        [attr.data-id]="link.id"
        class="text-black-200 dark:text-gray-200 text-lg hover:text-blue-300 dark:hover:text-white ease-in-out duration-200"
        [ngClass]="{ 'font-medium': link.id === activeSection }"
      >
        {{ link.label }}</a
      >
    }
    <span
      class="absolute bottom-0 border-b-2 border-blue-300 translate-y-1 transition-all! duration-300!"
      [style.left.px]="activeIndicatorStyle.left"
      [style.width.px]="activeIndicatorStyle.width"
    ></span>
  </nav>
  <button matIconButton class="sm:hidden!" (click)="toggleSidenav()">
    <mat-icon class="text-black-200! dark:text-white!">menu</mat-icon>
  </button>
</header>

<header class="sticky sm:static top-0 shadow-md md:shadow-none flex justify-between items-center py-4 px-6 h-[60px] z-10 bg-white dark:bg-blue-950">
  <div>
    @if (darkMode) {
      <button matIconButton (click)="toggleDarkMode()">
        <mat-icon class="text-gray-200!">light_mode</mat-icon>
      </button>
    } @else {
      <button matIconButton (click)="toggleDarkMode()">
        <mat-icon class="text-black-200!">dark_mode</mat-icon>
      </button>
    }
  </div>
  <nav class="hidden sm:flex gap-5">
    <a class="text-black-200 dark:text-gray-200 text-lg hover:text-white ease-in-out duration-200" href="#about">About</a>
    <a class="text-black-200 dark:text-gray-200 text-lg hover:text-white ease-in-out duration-200" href="#skills">Skills</a>
    <a class="text-black-200 dark:text-gray-200 text-lg hover:text-white ease-in-out duration-200" href="#experience">Experience</a>
    <a class="text-black-200 dark:text-gray-200 text-lg hover:text-white ease-in-out duration-200" href="#projects">Projects</a>
  </nav>
  <button matIconButton class="sm:hidden!" (click)="toggleSidenav()">
    <mat-icon class="text-black-200! dark:text-white!">menu</mat-icon>
  </button>
</header>

<nav class="flex flex-col gap-4 px-8 py-6">
  @for (link of navigationLinks; track $index) {
    <a
      [href]="link.link + link.fragment"
      class="text-black-200 dark:text-gray-200 text-lg hover:text-blue-300 dark:hover:text-white ease-in-out duration-200"
      (click)="toggleSidenav()"
      >{{ link.label }}</a
    >
  }
</nav>
